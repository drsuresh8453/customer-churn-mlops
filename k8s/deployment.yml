# k8s/deployment.yml — Customer Churn MLOps
# Production — 2 replicas

apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-churn-app
  labels:
    app: customer-churn
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-churn
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: customer-churn
    spec:
      containers:
      - name: customer-churn-app
        image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/customer-churn:latest
        ports:
        - containerPort: 8501
        - containerPort: 8000
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: aws-secret-access-key
        - name: AWS_REGION
          value: "ap-south-1"
        - name: S3_BUCKET
          value: "customer-churn-project-2024"
        - name: SAGEMAKER_PIPELINE
          value: "customer-churn-pipeline"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: customer-churn-service
spec:
  type: LoadBalancer
  selector:
    app: customer-churn
  ports:
  - name: streamlit
    port: 8501
    targetPort: 8501
  - name: fastapi
    port: 8000
    targetPort: 8000
